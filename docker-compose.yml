services:
  # 1. Database Service
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_db
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ShoaibLovesHerMother-@Fkrs1234
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql # Persistent volume for SQL data

  # 2. Backend Service
  api:
    build: ./LMS_API
    # Name the image so it's ready to push to your Docker Hub repo
    image: shoaibali808/csharp-lms-webapi:latest 
    container_name: csharp_webapi
    restart: unless-stopped
    ports:
      - "8080:8080" # Map host port to container port
    environment:
      # Docker Networking Magic: Notice the server name is "db" (the service name above), NOT "localhost"
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=LMS;User Id=sa;Password=ShoaibLovesHerMother-@Fkrs1234;TrustServerCertificate=True;
    depends_on:
      - db

  # 3. Frontend Service
  web:
    build: ./lms_frontend
    # Name the image for your Docker Hub repo
    image: shoaibali808/vue-lms-frontend:latest
    container_name: vue_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

# Define the named volume so Docker knows to create it
volumes:
  sql_data: